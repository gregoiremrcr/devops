---
- name: Configuration de base des serveurs
  hosts: all
  become: true
  gather_facts: false
  vars:
    packages:
      - curl
      - wget
      - vim
      - htop
      - net-tools

  pre_tasks:
    - name: Bootstrap Python for Ansible modules
      raw: test -e /usr/bin/python3 || (apt-get update && apt-get install -y python3 python3-apt)
      changed_when: false

    - name: Gather facts
      setup:

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: "{{ packages }}"
        state: present

    - name: Create application directory
      file:
        path: /opt/app
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy application environment file
      copy:
        content: |
          # Configuration de l'application
          APP_ENV=production
          APP_LOG_LEVEL=info
          APP_PORT=3000
        dest: /opt/app/.env
        mode: "0600"

    - name: Show system details
      debug:
        msg: |
          Hostname: {{ ansible_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
